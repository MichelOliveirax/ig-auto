name: Imovel da Semana

on:
  schedule:
    - cron: '0 17 * * 6'   # sabado 14h BRT (17h UTC)
  workflow_dispatch:
    inputs:
      test:
        description: 'TEST mode (nao publica)'
        required: false
        default: 'false'
      foto:
        description: 'Forcar um imovel especifico (foto_id ou parte da URL da foto)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  imovel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restaurar imoveis ja postados (anti-repeticao)
        uses: actions/cache@v4
        with:
          path: imoveis_postados.json
          key: imoveis-${{ github.run_id }}
          restore-keys: imoveis-

      - name: Buscar imovel e gerar conteudo
        env:
          FORCE_FOTO: ${{ github.event.inputs.foto }}
        run: python gerar_imovel.py

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Renderizar carrossel do imovel
        env:
          TEST: ${{ github.event.inputs.test == 'true' && '1' || '0' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python postar_imovel.py

      - name: Limpar imagens antigas (manter ultimos 150 PNGs)
        run: |
          if [ -d img ]; then
            ls -t img/*.png 2>/dev/null | tail -n +151 | xargs -r rm
          fi

      - name: Commitar imagens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img/
          git diff --staged --quiet || git commit -m "Add slides imovel $(date -u +%Y%m%d_%H%M%S)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main || true
            if git push; then break; fi
            sleep 3
          done

      - name: Publicar no Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
        run: python publicar_ig.py
