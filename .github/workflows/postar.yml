name: Postar Instagram Leilao

on:
  schedule:
    - cron: '0 12 * * *'   # 09h BRT - MENTALIDADE
    - cron: '0 16 * * *'   # 13h BRT - CONTEUDO
    - cron: '0 21 * * 2,5' # 18h BRT terca/sexta - CTA
    - cron: '0 21 * * 0,1,3,4,6' # 18h BRT outros dias - CASE
  workflow_dispatch:
    inputs:
      tipo:
        description: 'Tipo (MENTALIDADE/CONTEUDO/CTA/CASE)'
        required: true
        default: 'MENTALIDADE'
      test:
        description: 'TEST mode (nao publica)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Decidir tipo
        id: tipo
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tipo=${{ github.event.inputs.tipo }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            DOW=$(date -u +%u)
            if [ "$HOUR" = "12" ]; then echo "tipo=MENTALIDADE" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "16" ]; then echo "tipo=CONTEUDO" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "21" ]; then
              if [ "$DOW" = "2" ] || [ "$DOW" = "5" ]; then
                echo "tipo=CTA" >> $GITHUB_OUTPUT
              else
                echo "tipo=CASE" >> $GITHUB_OUTPUT
              fi
            else
              echo "tipo=MENTALIDADE" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Restaurar ganchos usados
        uses: actions/cache@v4
        with:
          path: ganchos_usados.json
          key: ganchos-${{ github.run_id }}
          restore-keys: ganchos-

      - name: Gerar conteudo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python gerar.py ${{ steps.tipo.outputs.tipo }}

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Renderizar slides
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
          TEST: ${{ github.event.inputs.test == 'true' && '1' || '0' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python postar.py

      - name: Limpar imagens antigas (manter ultimos 30 posts = 150 PNGs)
        run: |
          if [ -d img ]; then
            ls -t img/*.png 2>/dev/null | tail -n +151 | xargs -r rm
          fi

      - name: Commitar imagens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img/
          git diff --staged --quiet || git commit -m "Add slides $(date -u +%Y%m%d_%H%M%S)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main || true
            if git push; then break; fi
            sleep 3
          done

      - name: Publicar no Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
        run: python publicar_ig.py
